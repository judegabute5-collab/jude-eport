<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Electronic Portfolio</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    
    .portfolio-bg {
      background: linear-gradient(135deg, #0a1e3e 0%, #1a3a5c 35%, #0d2850 70%, #061b2f 100%);
      position: relative;
      overflow-x: hidden;
    }
    
    .portfolio-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300d4ff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    
    .float-symbol {
      position: absolute;
      opacity: 0.06;
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-20px) rotate(5deg); }
      50% { transform: translateY(-10px) rotate(-5deg); }
      75% { transform: translateY(-25px) rotate(3deg); }
    }
    
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .hero-title {
      animation: slideInLeft 0.8s ease forwards;
    }
    
    .hero-subtitle {
      animation: slideInLeft 0.8s ease 0.2s forwards;
      opacity: 0;
    }
    
    .hero-image {
      animation: slideInRight 0.8s ease 0.3s forwards;
      opacity: 0;
    }
    
    .portfolio-card {
      background: linear-gradient(145deg, rgba(56,189,248,0.08) 0%, rgba(14,165,233,0.04) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56,189,248,0.2);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .portfolio-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,0.1), transparent);
      transition: left 0.5s ease;
    }
    
    .portfolio-card:hover::before {
      left: 100%;
    }
    
    .portfolio-card:hover {
      transform: translateY(-15px) scale(1.03);
      border-color: rgba(56,189,248,0.5);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px rgba(56,189,248,0.2);
    }
    
    .portfolio-card-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    
    .card-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
      display: block;
    }
    
    .portfolio-card:hover .card-icon {
      transform: scale(1.2) rotate(10deg);
    }
    
    .card-title {
      color: #ffffff;
      font-weight: 700;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    
    .card-description {
      color: #cffafe;
      font-size: 0.95rem;
      opacity: 0.9;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="portfolio-bg h-full w-full overflow-auto relative z-10"><!-- Floating Tech Symbols -->
   <div class="float-symbol text-6xl" style="top: 10%; left: 5%; animation-delay: 0s;">
    💻
   </div>
   <div class="float-symbol text-5xl" style="top: 30%; right: 8%; animation-delay: 3s;">
    🌐
   </div>
   <div class="float-symbol text-6xl" style="top: 65%; left: 10%; animation-delay: 6s;">
    ⚙️
   </div>
   <div class="float-symbol text-5xl" style="top: 75%; right: 12%; animation-delay: 9s;">
    📱
   </div>
   <div class="float-symbol text-4xl" style="top: 45%; left: 20%; animation-delay: 12s;">
    🔧
   </div>
   <div class="float-symbol text-5xl" style="top: 85%; left: 25%; animation-delay: 15s;">
    🖥️
   </div><!-- Main Content -->
   <div class="min-h-full w-full px-6 py-16 relative z-10"><!-- Hero Section -->
    <section class="max-w-6xl mx-auto mb-20">
     <div class="flex flex-col md:flex-row gap-8 items-center justify-center mb-20"><!-- Profile Image -->
      <div class="hero-image flex justify-center items-center flex-shrink-0">
       <div class="relative">
        <div class="absolute -inset-4 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-3xl opacity-25 blur-2xl"></div><img src="https://drive.google.com/thumbnail?id=1HVAKB8wQh5d1bJfJfr-otCOtA6VgCNjP" alt="Jude C. Gabute" class="w-64 h-64 rounded-3xl object-cover shadow-2xl border-4 border-cyan-400 border-opacity-40 relative z-10" loading="lazy" onerror="console.error('Image failed to load:', this.src); this.style.background='linear-gradient(135deg, #00d4ff, #0ea5e9)'; this.alt='Profile photo unavailable';">
       </div>
      </div><!-- Name and Title -->
      <div class="hero-subtitle text-center md:text-left">
       <h1 class="hero-title text-5xl md:text-6xl font-black text-white mb-2" style="line-height: 1.1;">My Electronic<br><span style="background: linear-gradient(135deg, #00d4ff, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Portfolio</span></h1>
       <h2 class="text-3xl font-bold text-cyan-300 mb-2" id="student-name">Jude C. Gabute</h2>
       <p class="text-lg text-cyan-200" id="grade-section">Grade 9 - Fairness</p>
      </div>
     </div><!-- Portfolio Navigation Cards -->
     <div class="max-w-7xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6"><!-- About Me Card --> <a href="me.html" class="portfolio-card rounded-2xl p-8 min-h-48 hover:no-underline">
        <div class="portfolio-card-content"><span class="card-icon">👤</span>
         <h3 class="card-title">About Me</h3>
         <p class="card-description">Learn more about me</p>
        </div></a> <!-- ICT Browser Outputs Card --> <a href="ict.html" class="portfolio-card rounded-2xl p-8 min-h-48 hover:no-underline">
        <div class="portfolio-card-content"><span class="card-icon">💻</span>
         <h3 class="card-title">ICT Outputs</h3>
         <p class="card-description">Browser outputs</p>
        </div></a> <!-- AP Lessons Card --> <a href="ap-all.html" class="portfolio-card rounded-2xl p-8 min-h-48 hover:no-underline">
        <div class="portfolio-card-content"><span class="card-icon">📚</span>
         <h3 class="card-title">AP Lessons</h3>
         <p class="card-description">Araling Panlipunan</p>
        </div></a> <!-- School Events Card --> <a href="events-all.html" class="portfolio-card rounded-2xl p-8 min-h-48 hover:no-underline">
        <div class="portfolio-card-content"><span class="card-icon">🎉</span>
         <h3 class="card-title">School Events</h3>
         <p class="card-description">Event compilation</p>
        </div></a> <!-- Noli Play Card --> <a href="noli.html" class="portfolio-card rounded-2xl p-8 min-h-48 hover:no-underline">
        <div class="portfolio-card-content"><span class="card-icon">🎭</span>
         <h3 class="card-title">Noli Play</h3>
         <p class="card-description">Theater project</p>
        </div></a>
      </div>
     </div>
    </section>
   </div>
  </div>
  <script>
    lucide.createIcons();

    const defaultConfig = {
      student_name: 'Jude C. Gabute',
      grade_section: 'Grade 9 - Fairness'
    };

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const c = { ...defaultConfig, ...config };
          
          const nameEl = document.getElementById('student-name');
          if (nameEl) {
            nameEl.textContent = c.student_name;
          }

          const gradeEl = document.getElementById('grade-section');
          if (gradeEl) {
            gradeEl.textContent = c.grade_section;
          }
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => {
          const c = { ...defaultConfig, ...config };
          return new Map([
            ['student_name', c.student_name],
            ['grade_section', c.grade_section]
          ]);
        }
      });
    }
  </script>

</html>
